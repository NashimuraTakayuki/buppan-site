<!doctype html>
<html>
  <head>
    <base target="_top" />
    <style>
      /* 全体デザイン・共通 (メインカラーをオレンジ #FF9800 に変更) */
      :root {
        --primary-color: #ff9800;
        --bg-color: #f3f4f6;
        --text-color: #333;
        --danger: #dc2626;
        --success: #10b981;
      }
      body {
        font-family: "Helvetica Neue", Arial, sans-serif;
        background-color: var(--bg-color);
        margin: 0;
        padding: 0;
        color: var(--text-color);
        padding-bottom: 100px;
      }

      /* ヘッダー（背景オレンジ・白文字・カートアイコン付き） */
      header {
        background: var(--primary-color);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        position: sticky;
        top: 0;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        z-index: 100;
      }
      .cart-icon-btn {
        background: transparent;
        border: none;
        padding: 8px;
        cursor: pointer;
        color: #fff;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.2s;
      }
      .cart-icon-btn:active {
        transform: scale(0.9);
      }
      .cart-badge {
        position: absolute;
        top: 2px;
        right: 0px;
        background: #dc2626;
        color: white;
        font-size: 0.75rem;
        font-weight: bold;
        height: 18px;
        min-width: 18px;
        border-radius: 9px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 4px;
        box-sizing: border-box;
        border: 2px solid var(--primary-color);
      }

      /* コンテナ */
      .container {
        padding: 16px;
        max-width: 600px;
        margin: 0 auto;
      }

      /* カード・フォーム共通 */
      .card {
        background: #fff;
        border-radius: 12px;
        padding: 16px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        margin-bottom: 20px;
      }
      .form-group {
        margin-bottom: 16px;
        text-align: left;
      }
      .form-group label {
        display: block;
        font-size: 0.9rem;
        margin-bottom: 6px;
        font-weight: bold;
        color: #555;
      }
      select,
      input {
        width: 100%;
        padding: 12px;
        border: 1px solid #ccc;
        border-radius: 8px;
        box-sizing: border-box;
        font-size: 1rem;
      }
      button.primary-btn {
        width: 100%;
        background-color: var(--primary-color);
        color: white;
        border: none;
        padding: 14px;
        border-radius: 8px;
        font-size: 1.1rem;
        font-weight: bold;
        cursor: pointer;
        transition: 0.2s;
      }
      button:disabled {
        background-color: #9ca3af !important;
        cursor: not-allowed;
      }
      .back-btn {
        background: transparent;
        color: #666;
        border: 1px solid #ccc;
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        margin-top: 12px;
        cursor: pointer;
        font-weight: bold;
      }

      /* 商品一覧グリッド */
      .product-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
        gap: 16px;
      }
      .product-card {
        background: #fff;
        border-radius: 12px;
        padding: 12px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        cursor: pointer;
        text-align: center;
        transition: transform 0.2s;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }
      .product-card:active {
        transform: scale(0.98);
      }
      .product-img {
        width: 100%;
        height: 150px;
        border-radius: 8px;
        background-color: #e5e7eb;
        object-fit: cover;
        margin-bottom: 8px;
      }
      .product-title {
        font-size: 1rem;
        font-weight: bold;
        margin-bottom: 4px;
        line-height: 1.3;
      }
      .product-price {
        color: #dc2626;
        font-weight: bold;
      }
      .out-of-stock {
        opacity: 0.5;
        pointer-events: none;
      }

      /* モーダルUI */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        display: flex;
        justify-content: center;
        align-items: flex-end;
        z-index: 1000;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s;
      }
      .modal-overlay.active {
        opacity: 1;
        pointer-events: auto;
      }
      .modal-content {
        background: #fff;
        width: 100%;
        max-width: 600px;
        border-radius: 20px 20px 0 0;
        padding: 24px;
        box-sizing: border-box;
        transform: translateY(100%);
        transition: transform 0.3s;
        max-height: 90vh;
        overflow-y: auto;
      }
      .modal-overlay.active .modal-content {
        transform: translateY(0);
      }
      .close-btn {
        position: absolute;
        top: 16px;
        right: 20px;
        font-size: 1.5rem;
        cursor: pointer;
        color: #666;
      }
      .modal-desc {
        font-size: 0.9rem;
        color: #6b7280;
        margin-bottom: 16px;
        white-space: pre-wrap;
      }
      .qty-wrap input {
        width: 80px;
        text-align: center;
      }
      /* モーダル画像ギャラリー */
      .modal-images {
        display: flex;
        gap: 8px;
        overflow-x: auto;
        scroll-snap-type: x mandatory;
        -webkit-overflow-scrolling: touch;
        margin: -24px -24px 16px;
        padding: 0 24px 0;
        scrollbar-width: none;
      }
      .modal-images::-webkit-scrollbar {
        display: none;
      }
      .modal-images.single {
        justify-content: center;
      }
      .modal-img-item {
        flex: 0 0 calc(50% - 4px);
        scroll-snap-align: start;
      }
      .modal-images.single .modal-img-item {
        flex: 0 0 100%;
      }
      .modal-img-item img {
        width: 100%;
        height: 200px;
        object-fit: cover;
        background-color: #e5e7eb;
        display: block;
      }
      .modal-img-placeholder {
        width: 100%;
        height: 200px;
        background: #e5e7eb;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #999;
        font-size: 0.85rem;
      }

      /* 追従するカート（フローティングバー） */
      .floating-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        background: #fff;
        box-shadow: 0 -4px 10px rgba(0, 0, 0, 0.05);
        padding: 16px;
        box-sizing: border-box;
        z-index: 90;
        display: none;
        border-top: 1px solid #eee;
      }
      .floating-bar-content {
        max-width: 600px;
        margin: 0 auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .floating-total {
        font-size: 1.1rem;
        font-weight: bold;
      }
      .floating-btn {
        background-color: #10b981;
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 30px;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        box-shadow: 0 4px 6px rgba(16, 185, 129, 0.3);
      }

      /* カート・確認画面のアイテムリスト */
      .cart-item {
        border-bottom: 1px solid #eee;
        padding: 12px 0;
      }
      .cart-item:last-child {
        border-bottom: none;
      }
      .cart-item-header {
        display: flex;
        justify-content: space-between;
        margin-bottom: 8px;
      }
      .cart-item-details {
        flex-grow: 1;
      }
      .cart-item-remove {
        color: #dc2626;
        cursor: pointer;
        font-size: 0.85rem;
        display: inline-block;
        background: #fee2e2;
        padding: 6px 12px;
        border-radius: 4px;
        font-weight: bold;
      }
      .total-amount {
        font-size: 1.4rem;
        font-weight: bold;
        text-align: right;
        margin: 16px 0;
        color: #dc2626;
      }

      /* 数量編集UI（カート画面用） */
      .qty-control {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .qty-control button {
        background: #e5e7eb;
        border: none;
        width: 36px;
        height: 36px;
        border-radius: 50%;
        font-size: 1.2rem;
        font-weight: bold;
        cursor: pointer;
        color: #555;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      .qty-control button:active {
        background: #d1d5db;
      }
      .qty-control input {
        width: 50px;
        text-align: center;
        border: 1px solid #ccc;
        padding: 6px;
        border-radius: 4px;
        font-size: 1rem;
        pointer-events: none;
        background: #fff;
      }

      /* 確認画面の顧客情報表示 */
      .info-display {
        background: #f9fafb;
        padding: 12px;
        border-radius: 8px;
        font-size: 0.95rem;
        line-height: 1.6;
      }
      .info-display span {
        font-weight: bold;
        color: #555;
        display: inline-block;
        width: 100px;
      }

      /* バリデーション用のスタイル */
      .form-group input.invalid,
      .form-group textarea.invalid,
      .form-group select.invalid {
        border-color: var(--danger);
      }
      .form-group input.valid,
      .form-group textarea.valid,
      .form-group select.valid {
        border-color: var(--success);
      }
      .field-error {
        font-size: 0.75rem;
        color: var(--danger);
        margin-top: -0.6rem;
        margin-bottom: 0.4rem;
      }
    </style>
  </head>
  <body>
    <header>
      <h2>アスリッシュ物販</h2>
    </header>

    <div
      id="line-status"
      style="
        display: none;
        text-align: center;
        padding: 6px;
        background: #06c755;
        color: white;
        font-size: 0.82rem;
        font-weight: bold;
      "
    >
      ✓ LINEアカウント連携済み
    </div>

    <div id="loading" style="text-align: center; margin-top: 50px; color: #666">
      データを読み込んでいます...
    </div>

    <div class="container">
      <div id="login-view" style="display: none">
        <h3 style="text-align: center; color: #555">
          はじめにお客様情報を<br />入力してください
        </h3>
        <div class="card">
          <div class="form-group">
            <label>メールアドレス</label>
            <input
              type="email"
              id="input-email"
              placeholder="例: info@example.com"
            />
          </div>
          <div class="form-group">
            <label>参加スクール</label>
            <select id="input-school">
              <option value="">読み込み中...</option>
            </select>
          </div>
          <div class="form-group">
            <label>会員氏名</label>
            <input type="text" id="input-name" placeholder="例: 山田 太郎" />
          </div>
          <button class="primary-btn" onclick="startShopping()">
            商品一覧へ進む
          </button>
        </div>
      </div>

      <div id="product-list-view" style="display: none">
        <div id="app" class="product-grid"></div>
      </div>

      <div id="cart-view" style="display: none">
        <h2 style="text-align: center">🛒 カートの中身</h2>
        <div class="card">
          <div id="editable-cart-container"></div>
        </div>
        <button class="primary-btn" id="submit-btn" onclick="submitOrder()">
          注文確定
        </button>
        <button class="back-btn" onclick="backToShopping()">
          買い物を続ける
        </button>
      </div>

      <div id="complete-view" style="display: none">
        <div style="text-align: center; padding: 40px 16px">
          <div style="font-size: 4rem; margin-bottom: 16px">✅</div>
          <h2 style="color: #10b981; margin-bottom: 8px">
            ご注文ありがとうございます！
          </h2>
          <p style="color: #555; margin-bottom: 4px">注文IDを発行しました。</p>
          <p
            id="complete-order-id"
            style="
              font-size: 1.1rem;
              font-weight: bold;
              color: #333;
              background: #f3f4f6;
              display: inline-block;
              padding: 8px 20px;
              border-radius: 8px;
              margin-bottom: 20px;
            "
          ></p>
          <p
            style="
              color: #555;
              font-size: 0.95rem;
              line-height: 1.7;
              margin-bottom: 8px;
            "
          >
            ご注文内容の確認メールをお送りしました。<br />
            届いていない場合は迷惑メールフォルダをご確認ください。
          </p>
          <p style="color: #888; font-size: 0.85rem; margin-bottom: 32px">
            ※お支払いは月謝と合わせてご案内いたします。
          </p>
          <button
            class="primary-btn"
            onclick="backToTop()"
            style="max-width: 300px; margin: 0 auto; display: block"
          >
            トップに戻る
          </button>
        </div>
      </div>
    </div>

    <div id="floating-bar" class="floating-bar">
      <div class="floating-bar-content">
        <div class="floating-total">
          カートに
          <span id="float-count" style="color: #10b981; font-size: 1.3rem"
            >0</span
          >
          点<br />
          合計 ¥<span id="float-total">0</span>
        </div>
        <button class="floating-btn" onclick="goToCart()">
          カートを見る ＞
        </button>
      </div>
    </div>

    <div id="product-modal" class="modal-overlay">
      <div class="modal-content">
        <div id="modal-images" class="modal-images"></div>
        <span class="close-btn" onclick="closeModal()">×</span>
        <h2 id="modal-title" style="margin-top: 0"></h2>
        <p
          id="modal-price"
          class="product-price"
          style="font-size: 1.4rem; margin: 8px 0"
        ></p>
        <div id="modal-desc" class="modal-desc"></div>

        <div class="form-group">
          <label>サイズ / カラー選択</label>
          <select id="modal-sku" onchange="updateMaxQuantity()"></select>
        </div>
        <div class="form-group">
          <label>数量</label>
          <div class="qty-control">
            <button type="button" onclick="changeModalQty(-1)">-</button>
            <input type="number" id="modal-qty" value="1" min="1" readonly />
            <button type="button" onclick="changeModalQty(1)">+</button>
          </div>
        </div>
        <button class="primary-btn" id="modal-add-btn" onclick="addToCart()">
          カートに入れる
        </button>
      </div>
    </div>

    <script>
      // =============================================
      // 設定
      // =============================================
      const GAS_URL =
        "https://script.google.com/macros/s/AKfycbzi7X-uyxvxDIQyiwGeaYyyM_ks6aSvpmJs8uj3jcv8RcPf78cANXWH14L7h2SZY7RkZg/exec";
      const LINE_CHANNEL_ID = "2009555332";
      const REDIRECT_URI = "https://venerable-sawine-2fec62.netlify.app/";
      const LINE_AUTH_URL =
        "https://access.line.me/oauth2/v2.1/authorize" +
        "?response_type=code" +
        "&client_id=" +
        LINE_CHANNEL_ID +
        "&redirect_uri=" +
        encodeURIComponent(REDIRECT_URI) +
        "&state=aslish_sales" +
        "&scope=profile";

      // =============================================
      // GAS API ヘルパー
      // =============================================
      async function gasGet(action, params = {}) {
        const qs = new URLSearchParams({ action, ...params }).toString();
        const res = await fetch(`${GAS_URL}?${qs}`);
        return res.json();
      }

      async function gasPost(action, data = {}) {
        const res = await fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify({ action, ...data }),
        });
        return res.json();
      }

      // =============================================
      // 状態変数
      // =============================================
      let lineUserId = "";
      let globalProducts = [];
      let cart = [];
      let currentSelectedProduct = null;
      let customerInfo = { email: "", school: "", memberName: "" };

      // Google Drive URL をそのまま <img> タグで表示できる形式に変換する
      function normalizeDriveUrl(url) {
        if (!url) return "";
        url = url.trim();
        const fileMatch = url.match(
          /drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/,
        );
        if (fileMatch)
          return "https://lh3.googleusercontent.com/d/" + fileMatch[1];
        const ucMatch = url.match(
          /drive\.google\.com\/uc\?(?:[^&]+&)*id=([a-zA-Z0-9_-]+)/,
        );
        if (ucMatch) return "https://lh3.googleusercontent.com/d/" + ucMatch[1];
        return url;
      }

      // =============================================
      // バリデーション定義
      // =============================================
      const VALIDATORS = {
        "input-email": {
          test: (v) => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim()),
          msg: "メールアドレスの形式が正しくありません",
        },
        "input-school": {
          test: (v) => v.trim().length > 0,
          msg: "参加スクールを選択してください",
        },
        "input-name": {
          test: (v) => v.trim().length > 0,
          msg: "会員氏名を入力してください",
        },
      };

      function validateField(id) {
        const el = document.getElementById(id);
        const validator = VALIDATORS[id];
        if (!el || !validator) return true;
        const isValid = validator.test(el.value);
        let errEl = document.getElementById(id + "-error");
        if (!errEl) {
          errEl = document.createElement("p");
          errEl.id = id + "-error";
          errEl.className = "field-error";
          el.insertAdjacentElement("afterend", errEl);
        }
        if (isValid) {
          el.classList.remove("invalid");
          el.classList.add("valid");
          errEl.textContent = "";
        } else {
          el.classList.remove("valid");
          el.classList.add("invalid");
          errEl.textContent = validator.msg;
        }
        return isValid;
      }

      function validateAll() {
        return Object.keys(VALIDATORS)
          .map((id) => validateField(id))
          .every((result) => result);
      }

      // =============================================
      // 初期化
      // =============================================
      window.onload = async function () {
        const params = new URLSearchParams(window.location.search);
        const lineCode = params.get("code");
        const isLineApp = /Line\//.test(navigator.userAgent);

        // LINE Login コールバック処理
        if (lineCode) {
          try {
            const data = await gasPost("exchangeLineCode", { code: lineCode });
            lineUserId = data.userId || "";
          } catch (e) {
            console.error("LINE code exchange failed:", e);
          }
          // URLからcodeを除去
          history.replaceState({}, "", window.location.pathname);
        }

        // LINE連携状態の表示
        const statusEl = document.getElementById("line-status");
        if (lineUserId) {
          statusEl.style.display = "block";
          // LINE UserIDで顧客情報を取得して自動入力
          gasGet("getCustomerInfoByLineId", { lineUserId })
            .then(prefillCustomerInfo)
            .catch(() => {});
        } else if (isLineApp) {
          window.location.href = LINE_AUTH_URL;
          return;
        }

        // 商品データとスクール一覧を並行取得
        Promise.all([
          gasGet("getProductAndInventoryData"),
          gasGet("getSchoolList"),
        ])
          .then(([products, schools]) => {
            initData(products);
            initSchoolSelect(schools);
          })
          .catch((err) => {
            alert("通信エラー: " + err.message);
          });

        // バリデーションイベントを一括登録
        Object.keys(VALIDATORS).forEach((id) => {
          const el = document.getElementById(id);
          if (!el) return;
          if (el.tagName === "SELECT") {
            el.addEventListener("change", () => validateField(id));
          } else {
            el.addEventListener("blur", () => validateField(id));
            el.addEventListener("input", () => {
              if (el.classList.contains("invalid")) validateField(id);
            });
          }
        });
      };

      function initSchoolSelect(schools) {
        const select = document.getElementById("input-school");
        if (!schools || schools.length === 0) {
          select.innerHTML =
            '<option value="">スクール一覧の取得に失敗しました</option>';
          return;
        }
        select.innerHTML =
          '<option value="">スクールを選択してください</option>';
        schools.forEach((school) => {
          const option = document.createElement("option");
          option.value = school;
          option.textContent = school;
          select.appendChild(option);
        });
      }

      // --- LINEから取得した顧客情報をフォームに自動入力 ---
      function prefillCustomerInfo(info) {
        if (!info) return;
        if (info.email)
          document.getElementById("input-email").value = info.email;
        if (info.memberName)
          document.getElementById("input-name").value = info.memberName;
        if (info.school) {
          // スクールselectの読み込みを待って設定
          const trySet = (attempt) => {
            const select = document.getElementById("input-school");
            for (let i = 0; i < select.options.length; i++) {
              if (select.options[i].value === info.school) {
                select.selectedIndex = i;
                return;
              }
            }
            if (attempt < 10) setTimeout(() => trySet(attempt + 1), 200);
          };
          trySet(0);
        }
        ["input-email", "input-name"].forEach((id) => {
          if (document.getElementById(id).value) validateField(id);
        });
      }

      function initData(products) {
        document.getElementById("loading").style.display = "none";
        globalProducts = products;

        document.getElementById("login-view").style.display = "block";

        const app = document.getElementById("app");
        if (!products || products.length === 0) {
          app.innerHTML =
            '<p style="grid-column: 1 / -1; text-align:center;">現在表示できる商品がありません。</p>';
          return;
        }

        products.forEach((p) => {
          let totalStock = 0;
          if (p.stockList)
            p.stockList.forEach(
              (s) => (totalStock += Number(s["在庫数"]) || 0),
            );
          const isOutOfStock = totalStock <= 0;

          const imgSrc = normalizeDriveUrl(
            p["サムネイル画像"] ? String(p["サムネイル画像"]) : "",
          );
          const imgHtml = imgSrc
            ? `<img src="${imgSrc}" class="product-img" alt="${p["商品名"]}" onerror="this.style.display='none'">`
            : `<div class="product-img" style="display:flex; align-items:center; justify-content:center; color:#999; font-size:0.8rem;">No Image</div>`;

          const card = document.createElement("div");
          card.className = `product-card ${isOutOfStock ? "out-of-stock" : ""}`;
          card.onclick = () => openModal(p["商品ID"]);
          card.innerHTML = `
          <div>
            ${imgHtml}
            <div class="product-title">${p["商品名"]}</div>
          </div>
          <div class="product-price">${isOutOfStock ? "在庫切れ" : "¥" + Number(p["価格"]).toLocaleString()}</div>
        `;
          app.appendChild(card);
        });
      }

      // --- 情報入力 ---
      function startShopping() {
        if (!validateAll()) return;
        const email = document.getElementById("input-email").value.trim();
        const school = document.getElementById("input-school").value.trim();
        const name = document.getElementById("input-name").value.trim();

        customerInfo = { email: email, school: school, memberName: name };

        hideAllViews();
        document.getElementById("product-list-view").style.display = "block";
        updateCartUI();
        window.scrollTo(0, 0);
      }

      function editUserInfo() {
        hideAllViews();
        document.getElementById("login-view").style.display = "block";
        window.scrollTo(0, 0);
      }

      // --- モーダル制御 ---
      function openModal(productId) {
        const p = globalProducts.find(
          (prod) => String(prod["商品ID"]) === String(productId),
        );
        if (!p) return;
        currentSelectedProduct = p;

        // 画像ギャラリーを構築
        const imageGallery = document.getElementById("modal-images");
        imageGallery.innerHTML = "";
        const rawUrls = p["詳細画像"] ? String(p["詳細画像"]) : "";
        const imgUrls = rawUrls
          .split(",")
          .map((u) => normalizeDriveUrl(u))
          .filter((u) => u.length > 0);
        if (imgUrls.length === 0) {
          imageGallery.classList.add("single");
          imageGallery.innerHTML =
            '<div class="modal-img-item"><div class="modal-img-placeholder">No Image</div></div>';
        } else {
          imageGallery.classList.toggle("single", imgUrls.length === 1);
          imgUrls.forEach((url) => {
            const item = document.createElement("div");
            item.className = "modal-img-item";
            item.innerHTML = `<img src="${url}" alt="${p["商品名"]}" onerror="this.parentElement.innerHTML='<div class=\\'modal-img-placeholder\\'>No Image</div>'">`;
            imageGallery.appendChild(item);
          });
        }

        document.getElementById("modal-title").innerText = p["商品名"];
        document.getElementById("modal-price").innerText =
          "¥" + Number(p["価格"]).toLocaleString();
        document.getElementById("modal-desc").innerText = p["商品説明"] || "";

        const skuSelect = document.getElementById("modal-sku");
        skuSelect.innerHTML = "";

        p.stockList.forEach((stock) => {
          const stockNum = Number(stock["在庫数"]) || 0;
          const option = document.createElement("option");
          option.value = stock["SKU"];
          option.dataset.stock = stockNum;
          if (stockNum > 0) {
            option.text = `サイズ: ${stock["サイズ"]} / カラー: ${stock["カラー"]} (残り ${stockNum})`;
          } else {
            option.text = `サイズ: ${stock["サイズ"]} / カラー: ${stock["カラー"]} (在庫切れ)`;
            option.disabled = true;
          }
          skuSelect.appendChild(option);
        });

        document.getElementById("modal-qty").value = 1;
        updateMaxQuantity();
        document.getElementById("product-modal").classList.add("active");
      }

      function closeModal() {
        document.getElementById("product-modal").classList.remove("active");
        currentSelectedProduct = null;
      }

      function updateMaxQuantity() {
        const skuSelect = document.getElementById("modal-sku");
        const selectedOption = skuSelect.options[skuSelect.selectedIndex];
        const maxStock = selectedOption
          ? Number(selectedOption.dataset.stock)
          : 0;
        const qtyInput = document.getElementById("modal-qty");
        const addBtn = document.getElementById("modal-add-btn");

        qtyInput.max = maxStock;
        if (maxStock <= 0) {
          addBtn.disabled = true;
          addBtn.innerText = "在庫切れ";
        } else {
          addBtn.disabled = false;
          addBtn.innerText = "カートに入れる";
          if (Number(qtyInput.value) > maxStock) qtyInput.value = maxStock;
        }
      }

      function changeModalQty(delta) {
        const qtyInput = document.getElementById("modal-qty");
        const newQty = Number(qtyInput.value) + delta;
        const maxStock = Number(qtyInput.max);
        if (newQty < 1 || newQty > maxStock) return;
        qtyInput.value = newQty;
      }

      // --- カート追加 ---
      function addToCart() {
        const skuSelect = document.getElementById("modal-sku");
        const selectedOption = skuSelect.options[skuSelect.selectedIndex];
        const sku = skuSelect.value;
        const qty = Number(document.getElementById("modal-qty").value);
        const maxStock = Number(selectedOption.dataset.stock);

        if (qty > maxStock) {
          alert("在庫数を超えてカートに入れることはできません。");
          return;
        }

        const existingItem = cart.find((item) => item.sku === sku);
        if (existingItem) {
          if (existingItem.quantity + qty > maxStock) {
            alert(
              `すでにカートに ${existingItem.quantity} 個入っています。在庫(${maxStock}個)を超える追加はできません。`,
            );
            return;
          }
          existingItem.quantity += qty;
        } else {
          cart.push({
            sku: sku,
            productName: currentSelectedProduct["商品名"],
            variation: selectedOption.text.split(" (")[0],
            price: Number(currentSelectedProduct["価格"]),
            quantity: qty,
            maxStock: maxStock,
          });
        }

        updateCartUI();
        closeModal();
      }

      function updateCartUI() {
        const bar = document.getElementById("floating-bar");
        const count = cart.reduce((sum, item) => sum + item.quantity, 0);
        const total = cart.reduce(
          (sum, item) => sum + item.price * item.quantity,
          0,
        );

        const isProductListVisible =
          document.getElementById("product-list-view").style.display ===
          "block";

        if (count > 0 && isProductListVisible) {
          document.getElementById("float-count").innerText = count;
          document.getElementById("float-total").innerText =
            total.toLocaleString();
          bar.style.display = "block";
        } else {
          bar.style.display = "none";
        }
      }

      // --- 画面切り替え共通 ---
      function hideAllViews() {
        document.getElementById("login-view").style.display = "none";
        document.getElementById("product-list-view").style.display = "none";
        document.getElementById("cart-view").style.display = "none";
        document.getElementById("complete-view").style.display = "none";
        document.getElementById("floating-bar").style.display = "none";
      }

      function backToTop() {
        cart = [];
        customerInfo = { email: "", school: "", memberName: "" };
        ["input-email", "input-school", "input-name"].forEach((id) => {
          const el = document.getElementById(id);
          if (!el) return;
          el.value = "";
          el.classList.remove("valid", "invalid");
          const errEl = document.getElementById(id + "-error");
          if (errEl) errEl.textContent = "";
        });
        hideAllViews();
        document.getElementById("login-view").style.display = "block";
        window.scrollTo(0, 0);
      }

      // --- 画面3: カート編集へ ---
      function goToCart() {
        hideAllViews();
        document.getElementById("cart-view").style.display = "block";
        renderEditableCart();
        window.scrollTo(0, 0);
      }

      function backToShopping() {
        hideAllViews();
        document.getElementById("product-list-view").style.display = "block";
        updateCartUI();
        window.scrollTo(0, 0);
      }

      // カート編集画面の描画
      function renderEditableCart() {
        const container = document.getElementById("editable-cart-container");
        container.innerHTML = "";
        let total = 0;

        if (cart.length === 0) {
          container.innerHTML =
            '<p style="color:#666; text-align:center;">カートは空です。</p>';
          document.getElementById("submit-btn").disabled = true;
        } else {
          document.getElementById("submit-btn").disabled = false;
          cart.forEach((item, index) => {
            total += item.price * item.quantity;
            const div = document.createElement("div");
            div.className = "cart-item";
            div.innerHTML = `
            <div class="cart-item-header">
              <div class="cart-item-details">
                <strong>${item.productName}</strong><br>
                <span style="font-size:0.85rem; color:#666;">${item.variation}</span>
              </div>
              <div style="font-weight:bold; color:var(--primary-color);">¥${(item.price * item.quantity).toLocaleString()}</div>
            </div>
            <div style="display:flex; justify-content:space-between; align-items:center;">
              <span class="cart-item-remove" onclick="removeCartItem(${index})">削除</span>
              <div class="qty-control">
                <button type="button" onclick="changeQty(${index}, -1)">-</button>
                <input type="number" readonly value="${item.quantity}">
                <button type="button" onclick="changeQty(${index}, 1)">+</button>
              </div>
            </div>
          `;
            container.appendChild(div);
          });
          const totalDiv = document.createElement("div");
          totalDiv.className = "total-amount";
          totalDiv.innerHTML = `合計: ¥<span>${total.toLocaleString()}</span>`;
          container.appendChild(totalDiv);
        }
      }

      // カート内での数量増減
      function changeQty(index, delta) {
        const item = cart[index];
        const newQty = item.quantity + delta;

        if (newQty <= 0) {
          if (confirm("商品をカートから削除しますか？")) {
            removeCartItem(index);
          }
        } else if (newQty > item.maxStock) {
          alert(
            `在庫数（残り${item.maxStock}個）を超えて追加することはできません。`,
          );
        } else {
          item.quantity = newQty;
          renderEditableCart();
        }
      }

      function removeCartItem(index) {
        cart.splice(index, 1);
        renderEditableCart();
        if (cart.length === 0) {
          setTimeout(() => {
            alert("カートが空になったため、商品一覧へ戻ります。");
            backToShopping();
          }, 100);
        }
      }

      // --- 注文確定 ---
      async function submitOrder() {
        if (!confirm("この内容で注文を確定してよろしいですか？")) return;

        const payload = {
          customerInfo: customerInfo,
          cart: cart,
          lineUserId: lineUserId,
        };

        const btn = document.getElementById("submit-btn");
        btn.disabled = true;
        btn.innerText = "処理中...";

        try {
          const response = await gasPost("submitOrder", { payload });
          if (response.success) {
            cart = [];
            hideAllViews();
            document.getElementById("complete-order-id").innerText =
              response.orderId;
            document.getElementById("complete-view").style.display = "block";
            window.scrollTo(0, 0);
          } else {
            alert(response.message);
            btn.disabled = false;
            btn.innerText = "注文確定";
          }
        } catch (e) {
          alert("通信エラーが発生しました。もう一度お試しください。");
          btn.disabled = false;
          btn.innerText = "注文確定";
        }
      }
    </script>
  </body>
</html>
